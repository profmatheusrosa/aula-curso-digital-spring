<div class="header">
  <h2>{{ isEdit ? 'Editar Usuário' : 'Novo Usuário' }}</h2>
</div>

<div class="glass-panel form-container">
  <form (ngSubmit)="salvar()" #form="ngForm">
    <div class="form-group">
      <label for="nome">Nome Completo</label>
      <input type="text" id="nome" name="nome" [(ngModel)]="usuario.nome" required placeholder="Ex: Maria Alice">
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" [(ngModel)]="usuario.email" required placeholder="maria@exemplo.com">
    </div>

    <div class="form-group">
      <label for="dob">Data de Nascimento</label>
      <input type="date" id="dob" name="dob" [(ngModel)]="usuario.dob" required>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" routerLink="/usuarios">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="!form.valid">Salvar</button>
    </div>
  </form>
</div>
